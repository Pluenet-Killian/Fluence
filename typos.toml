# typos — orthographe du CODE (identifiants et commentaires, en anglais).
# La prose française (documents, configs commentées en FR) est exclue : le
# dictionnaire de typos est anglais et produirait des faux positifs massifs.

[default]
# Citations françaises dans la doc de code (guillemets français) : le
# produit est FR-first, les exemples de données utilisateur restent en
# français réaliste.
extend-ignore-re = ["«[^»]*»"]

[default.extend-words]
# Mots français des chaînes d'exemple/test qui ressemblent à des typos
# anglaises. S'allonge au besoin — on ne traduit pas des données réalistes.
fille = "fille"
# Registre du corpus d'éval (§5.D) : « familier », pas l'anglais « familiar ».
familier = "familier"
# Vocabulaire FR des générateurs/corpus d'éval (§5.D, §8.A) confondu avec des
# typos anglaises : mots-outils, abréviations, marqueurs de la grille, dialogues.
sur = "sur"
maintenant = "maintenant"
heros = "heros"
abord = "abord"
# Bloc de contexte du moteur (§5.C) : « registre » de langue, pas « register ».
registre = "registre"
# Consigne anti-pathos du teacher et fichier de revue (§5.D) : prose FR.
moteur = "moteur"
exemple = "exemple"
demandes = "demandes"
symbole = "symbole"
confirme = "confirme"

[files]
extend-exclude = [
    "*.md",
    "docs/",
    "LICENSES/",
    "LICENSE",
    "*.toml",
    "*.yml",
    "*.yaml",
    "*.lock",
    # Corpus data (§5.D): French dialogues plus *deliberately* corrupted
    # noised/abbreviated variants — not code, and not to be spell-checked.
    "ml/data/corpus/",
]
