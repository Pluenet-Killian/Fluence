# Nightly — T2 (fuzz, dès Phase 2), T6 (éval/latences, dès Phase 3), soak.
# Phase 0 : tests release cross-OS (détecte les soucis release-only) et
# audit advisories quotidien (une CVE peut tomber n'importe quand).
name: nightly

on:
  schedule:
    - cron: "17 2 * * *" # 02:17 UTC, heure creuse décalée
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests-release:
    name: full tests in release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup show active-toolchain || rustup toolchain install
      - name: Install NASM (Windows, vendored OpenSSL)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1
      - uses: Swatinem/rust-cache@v2
      - name: Rust tests (release)
        run: cargo test --workspace --release
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: TS build + tests
        run: pnpm -r build && pnpm -r test
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Python tests
        run: uv sync --directory ml && uv run --directory ml pytest

  gaze-accuracy:
    name: gaze accuracy (T4, synthetic)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - name: Replay synthetic gaze sessions and publish the accuracy (Phase 6)
        run: cargo run --release -p xtask -- gaze-accuracy | tee -a "$GITHUB_STEP_SUMMARY"

  latency:
    name: latency budgets (provisional)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      # Gates the model-free realtime class (input decision) against §5.A × 2.5
      # (PLAN §0.8). The model-dependent classes are measured `--contractual` on
      # the FLU-REF reference machine.
      - name: Measure and gate input-decision latency
        run: cargo run --release -p xtask -- latency | tee -a "$GITHUB_STEP_SUMMARY"

  soak:
    name: extended soak (kill cycles, RSS bounded)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      # Extended proxy for the soak criterion (PLAN 7.6): many supervised-worker
      # kill/restart cycles with the hub RSS held bounded. The full 8 h nightly
      # and the 72 h one-shot run on the FLU-REF reference machine (a physical
      # gate, protocol in docs/ops/soak.md) — GitHub's 6 h job cap can't host them.
      - name: Extended kill-cycle soak
        env:
          FLUENCE_SOAK_CYCLES: "300"
        run: cargo test -p fluence-hub --test kill_tests kill_cycles_keep_rss_bounded -- --nocapture

  advisories:
    name: daily dependency advisories
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories
