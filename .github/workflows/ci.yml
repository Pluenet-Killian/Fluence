# CI principale — lint + T1 (unit/doctests) + T3 (contrats, dès la Phase 1).
# Matrice Windows + Linux : la Definition of Done exige les deux OS (PLAN §0.1).
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup show active-toolchain || rustup toolchain install
      # SQLCipher (fluence-store) builds OpenSSL from source; the MSVC
      # toolchain needs NASM for its assembly. Perl ships on the runner.
      - name: Install NASM (Windows, vendored OpenSSL)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (pedantic, warnings are errors)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests (unit + doctests)
        run: cargo test --workspace
      - name: Rustdoc (public API docs must build cleanly)
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - name: SPDX license headers (D-10.1)
        run: cargo xtask check-licenses

  typescript:
    name: typescript (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm -r lint
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Build
        run: pnpm -r build
      - name: Tests
        run: pnpm -r test
      - name: Prettier
        run: pnpm format:check

  python:
    name: python (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync workspace
        run: uv sync --directory ml
      - name: Ruff lint
        run: uv run --directory ml ruff check .
      - name: Ruff format
        run: uv run --directory ml ruff format --check .
      - name: Mypy (strict)
        run: uv run --directory ml mypy .
      # The harness measures the real fluence-ngram crate, not a reimplementation
      # (SPEC §8.A, ADR-0006): build its binary so the n-gram sanity test runs
      # here rather than skipping. The crate only depends on serde — no NASM /
      # OpenSSL, so this is a fast, system-dependency-free build.
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - name: Build the n-gram binary (eval prediction source)
        run: cargo build -p fluence-ngram
      - name: Pytest
        run: uv run --directory ml pytest
      # Publish the per-mode KS% table to the PR's check summary (the « delta »
      # of PLAN 3.6). The hard regression gate itself is the pytest baseline
      # test above; this is visibility. Linux only — the numbers are identical
      # on both OSes by construction (integer counters).
      - name: Eval summary (KS% per mode)
        if: runner.os == 'Linux'
        run: |
          {
            echo '### Eval — KS% per mode (corpus v0, suite pr)'
            echo '```'
            cargo run -q -p xtask -- run-eval --suite pr 2>/dev/null
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  contracts:
    name: contracts (T3)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup show active-toolchain || rustup toolchain install
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generated artifacts match fluence-protocol
        run: cargo xtask check-contracts --check
      - name: OpenAPI lint (spectral)
        run: pnpm exec spectral lint schemas/openapi.json --ruleset .spectral.yaml --fail-severity warn

  coverage:
    name: coverage gates (PLAN §1)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup show active-toolchain || rustup toolchain install
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      # Gates par crate (PLAN §1) : ajoutées au fur et à mesure que les
      # crates gagnent du vrai code. Phase 1 : fluence-protocol ≥ 85 %.
      - name: fluence-protocol ≥ 85% lines
        run: cargo llvm-cov --package fluence-protocol --fail-under-lines 85
      # Phase 7: the gaze/input engine is the other dense, pure, heavily-tested
      # brick — gate it too (PLAN §1, A1 « couvertures aux gates »).
      - name: fluence-input ≥ 85% lines
        run: cargo llvm-cov --package fluence-input --fail-under-lines 85

  cargo-deny:
    name: dependency licenses & advisories
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  typos:
    name: spelling (code only)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1

  commitlint:
    name: conventional commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
