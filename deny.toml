# Configuration cargo-deny — bloquant en CI (PLAN §0.6).
# Licences des dépendances, advisories RustSec, doublons, sources.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Licences acceptables pour les DÉPENDANCES. Nos crates apps/ (AGPL-3.0-only)
# passent par les exceptions ciblées ci-dessous — l'AGPL n'est jamais acceptée
# pour une dépendance tierce des briques Apache-2.0 (D-10.1).
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
]
confidence-threshold = 0.93
# Quand les crates AGPL d'apps/ naîtront (fluencectl en Phase 2), elles
# passeront par des [[licenses.exceptions]] ciblées par nom de crate.

# Exceptions ciblées : une licence autorisée crate par crate, jamais globalement.
[[licenses.exceptions]]
# option-ext (dépendance transitive de `directories`, via `dirs-sys`) est sous
# MPL-2.0 — copyleft *au niveau fichier* : consommer la crate sans la modifier
# n'impose rien à notre code. Sûr comme dépendance ; vetté ici explicitement
# plutôt que d'ouvrir MPL-2.0 pour tout le graphe.
name = "option-ext"
allow = ["MPL-2.0"]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Les membres du workspace se référencent par chemin sans version.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
