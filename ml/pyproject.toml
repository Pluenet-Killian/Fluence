# Racine (virtuelle) du workspace uv — pipelines ML offline (SPEC §2.B).
# Trois membres : data (génération/préparation de corpus), training (LoRA),
# eval (harnais de simulation, exécuté aussi en CI — D-8.1).

[tool.uv.workspace]
members = ["data", "training", "eval"]

[dependency-groups]
dev = [
    "pytest>=8",
    "mypy>=1.13",
    "ruff>=0.8",
]

# ---- Qualité partagée par tous les membres (PLAN §0.6 : ruff + mypy strict) ----

[tool.ruff]
line-length = 100
src = ["data/src", "training/src", "eval/src"]

[tool.ruff.lint]
# Typographie mathématique de la SPEC, légitime en docstring/commentaire,
# jamais dans un identifiant : « × » (12 situations × 4 registres),
# « − » (le vrai signe moins, p.ex. la porte « KS% −2 points » de §8.A),
# « – » (tiret demi-cadratin des plages, p.ex. « dwell 600–1500 ms »).
allowed-confusables = ["×", "−", "–"]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # bugbear
    "SIM", # simplify
    "RUF", # ruff-specific
    "D",   # pydocstyle — la doc d'API publique fait partie de la DoD
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"**/tests/*" = ["D"]

[tool.mypy]
strict = true
# Teaches mypy about pydantic v2 (validators, computed_field over @property…).
plugins = ["pydantic.mypy"]
files = ["data", "training", "eval"]

[tool.pytest.ini_options]
testpaths = ["data/tests", "training/tests", "eval/tests"]
# « register » (registre, §5.D — et le champ du contrat) éclipse la méthode de
# métaclasse ABCMeta.register, jamais appelée sur un modèle de données. Le
# champ est intentionnel ; on filtre le warning bénin pour garder une sortie nette.
filterwarnings = [
    'ignore:Field name "register".*:UserWarning',
]
